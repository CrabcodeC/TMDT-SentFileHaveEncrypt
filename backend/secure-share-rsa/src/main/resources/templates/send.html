<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gửi File Bảo Mật</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Gửi Tập Tin Bảo Mật (Hybrid)</h1>

      <form id="sendForm" enctype="multipart/form-data">
        <label>Người gửi:</label>
        <select id="sender">
          <option value="minhkhang">Minh Khang</option>
          <option value="minhphuc">Minh Phúc</option>
          <option value="trunghoa">Trung Hòa</option>
          <option value="thayquang">Thầy Quang</option>
        </select>

        <label>Người nhận:</label>
        <select id="recipient">
          <option value="minhkhang">Minh Khang</option>
          <option value="minhphuc">Minh Phúc</option>
          <option value="trunghoa">Trung Hòa</option>
          <option value="thayquang">Thầy Quang</option>
        </select>

        <label>Chọn File:</label>
        <input type="file" id="file" required />

        <button type="submit">🚀 GỬI FILE BẢO MẬT</button>
      </form>

      <div id="status" style="margin-top: 20px; font-weight: bold"></div>
      <a href="/" class="back">← Back Home</a>
    </div>

    <script src="/send.js"></script>
  </body>
</html>
