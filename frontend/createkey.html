<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <h1>Tạo khóa cho riêng bạn</h1>
      <div
        class="content"
        style="
          border: 100%;
          height: 200px;
          border: 1px solid #756c6c;
          border-radius: 10px;
          text-align: center;
          margin: 20px;
        "
      >
        <div class="muc">
          <div>Tạo Private Key:</div>
          <p>
            <input
              type="text"
              name="private-key"
              placeholder="Private Key"
              required
            />
          </p>
        </div>

        <div class="muc">
          <div>Public Key:</div>
          <p>
            <input type="text" name="public-key" placeholder="Public Key" />
          </p>
        </div>

        <div class="btn-muc">
          <p>
            <button name="submit">Tạo cặp khóa</button>
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
